<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>供应商名录汇总</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">采购供应商管理</p>
          <h1>合格供应商名录</h1>
        </div>
        <div class="actions">
          <label class="button primary" for="fileInput">
            <img alt="" src="/icons/upload.svg" />
            <span>导入 Excel</span>
          </label>
          <button class="button" id="exportButton" type="button">
            <img alt="" src="/icons/download.svg" />
            <span>导出 Excel</span>
          </button>
          <button class="button danger" id="clearArchiveButton" type="button">
            <img alt="" src="/icons/trash-2.svg" />
            <span>删除历史清档</span>
          </button>
        </div>
      </header>

      <input id="fileInput" type="file" accept=".xlsx,.xls" />
      <datalist id="creditLevelOptions">
        <option value="A+"></option>
        <option value="A"></option>
        <option value="B"></option>
        <option value="C"></option>
        <option value="D"></option>
      </datalist>

      <section class="summary-grid" aria-label="供应商汇总">
        <div class="metric">
          <span>供应商总数</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="metric">
          <span>最近导入</span>
          <strong id="lastImport">-</strong>
        </div>
        <div class="metric">
          <span>新增</span>
          <strong id="addedCount">0</strong>
        </div>
        <div class="metric">
          <span>覆盖</span>
          <strong id="updatedCount">0</strong>
        </div>
      </section>

      <section class="upload-strip" id="dropZone">
        <div>
          <strong>拖入或选择供应商 Excel</strong>
          <span>按供应商名称去重；重复名称以最新上传内容覆盖。每次上传都会存档，直到手动清档。</span>
        </div>
        <button class="icon-button" id="refreshButton" title="刷新数据" type="button">
          <img alt="" src="/icons/refresh-cw.svg" />
        </button>
      </section>

      <section class="warning-bar" id="clearWarning" role="alert" hidden>
        <strong>清档会删除所有上传历史、存档文件和当前汇总数据。</strong>
        <span>如确认清档，请再次点击右上角“确认清档”。</span>
      </section>

      <section class="history-panel" aria-label="上传历史">
        <div class="section-head">
          <div>
            <h2>上传历史</h2>
            <span id="historyCount">0 条记录</span>
          </div>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">暂无上传历史</div>
        </div>
      </section>

      <section class="list-toolbar" aria-label="供应商搜索">
        <label class="search-box" for="searchInput">
          <img alt="" src="/icons/search.svg" />
          <input id="searchInput" type="search" placeholder="搜索供应商名称、分类、材料、联系人、电话" />
          <button class="search-clear" id="clearSearchButton" title="清空搜索" type="button">
            <img alt="" src="/icons/x.svg" />
          </button>
        </label>
        <span id="searchCount">0 条</span>
      </section>

      <section class="table-wrap" aria-label="供应商列表">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th>供应商代码</th>
              <th>供应商名称</th>
              <th>供应商性质</th>
              <th>供应商分类</th>
              <th>主要供应材料</th>
              <th>信用等级</th>
              <th>合格/优秀</th>
              <th>合同签订日期</th>
              <th>合同截止日期</th>
              <th>导入日期</th>
              <th>业务联系人</th>
              <th>联系电话</th>
              <th>备注</th>
            </tr>
          </thead>
          <tbody id="supplierBody">
            <tr>
              <td class="empty" colspan="14">暂无供应商数据</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
